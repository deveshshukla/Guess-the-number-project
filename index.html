<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="style.css" />

  <!--Favicon-->
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

  <title>Guess My Number!</title>
</head>

<body class="body-container">
  <header>
    <div class="radioBtnContainer">
      <label class="radioBtn">
        <input type="radio" name="gamelevel" value="easy">Easy
      </label>

      <label class="radioBtn">
        <input type="radio" name="gamelevel" value="medium">Medium
      </label>

      <label class="radioBtn">
        <input type="radio" name="gamelevel" value="hard">Hard
      </label>
    </div>

    <h1 class="txtHeading">Guess My Number!</h1>

    <span class="txtLevel">
      Guess btween (1 to 20)
    </span>
    <span class="txtRule">
      Wrong penalty (-1 score)
    </span>

    <button class="btn again">Again!</button>

    <div class="secNumber">?</div>
  </header>
  <main id="main-container">
    <section class="left">
      <input type="number" name="guess-num" class="guess" value="0" />
      <button class="btn check">Check!</button>
    </section>
    <section class="right">
      <p class="message">Start guessing..?</p>
      <p class="label-score">💯 Score: <span class="score">20</span></p>
      <p class="label-highscore">
        🏆 Highscore: <span class="highscore">0</span>
      </p>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
